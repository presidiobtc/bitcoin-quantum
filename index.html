    <script>
        const REPORT_TITLE = "Bitcoin's Quantum Readiness: Exposure, Mitigations, and Upgrade Paths";

        fetch('README.md')
            .then(response => response.text())
            .then(text => {
                const footnotes = {};
                const footnotePattern = /^\[(\^[^\]]+)\]:\s*(.+)$/gm;
                let match;
                while ((match = footnotePattern.exec(text)) !== null) {
                    footnotes[match[1]] = match[2].trim();
                }

                const footnoteDefinitions = [];
                Object.keys(footnotes).forEach(id => {
                    footnoteDefinitions.push({ num: id.substring(1), content: footnotes[id] });
                });

                let processedText = text.replace(/^\[\^[^\]]+\]:\s*.+$/gm, '');

                window.footnoteContent = {};
                Object.keys(footnotes).forEach(id => {
                    const refPattern = new RegExp('\\[\\' + id + '\\]', 'g');
                    const footnoteNum = id.substring(1);
                    let content = footnotes[id];

                    const markdownLinkMatch = content.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
                    if (markdownLinkMatch) {
                        const linkUrl = markdownLinkMatch[2];
                        content = `<a href="${linkUrl}" target="_blank" rel="noopener noreferrer" style="color: #c0c898; text-decoration: none; word-break: break-all;">${linkUrl}</a>`;
                    } else if (content.match(/^https?:\/\//)) {
                        content = `<a href="${content}" target="_blank" rel="noopener noreferrer" style="color: #c0c898; text-decoration: none; word-break: break-all;">${content}</a>`;
                    } else {
                        content = content
                            .replace(/&/g, '&amp;')
                            .replace(/</g, '&lt;')
                            .replace(/>/g, '&gt;')
                            .replace(/"/g, '&quot;')
                            .replace(/'/g, '&#039;');
                    }

                    window.footnoteContent[footnoteNum] = content;
                    const placeholder = `%%FOOTNOTE_${footnoteNum}_PLACEHOLDER%%`;
                    const tooltipHtml = `<span class="footnote-ref" style="position: relative; display: inline-block;"><sup><a href="#" onclick="return false;" style="text-decoration: none; color: var(--text);">[${footnoteNum}]</a></sup><span class="footnote-tooltip" data-footnote="${footnoteNum}">${placeholder}</span></span>`;
                    processedText = processedText.replace(refPattern, tooltipHtml);
                });

                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    headerIds: true,
                    mangle: false,
                    headerPrefix: ''
                });

                let html = marked.parse(processedText);
                document.getElementById('content').innerHTML = html;

                fixHeaderIds();
                renderFootnoteTooltips();
                injectFootnoteAppendix(footnoteDefinitions);
                applyGlossaryTooltips();
                generateTOC();
                setupScrollSpy();
                fetchLastUpdated();
                setupMobileInteractions();
                wrapTables();

                if (window.location.hash) {
                    setTimeout(() => {
                        const target = document.querySelector(window.location.hash);
                        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 100);
                }
            })
            .catch(error => {
                document.getElementById('content').innerHTML = '<p>Error loading README.md: ' + error + '</p>';
            });

        function renderFootnoteTooltips() {
            if (!window.footnoteContent) return;
            Object.keys(window.footnoteContent).forEach(num => {
                document.querySelectorAll(`.footnote-tooltip[data-footnote="${num}"]`).forEach(tt => {
                    tt.innerHTML = window.footnoteContent[num];
                });
            });
        }

        function injectFootnoteAppendix(footnoteDefinitions) {
            if (footnoteDefinitions.length === 0) return;
            const footnotesHeader = Array.from(document.querySelectorAll('h1, h2')).find(
                h => h.textContent.trim().toLowerCase() === 'footnotes'
            );
            if (!footnotesHeader) return;

            const list = document.createElement('ol');
            list.style.paddingLeft = '20px';
            list.style.lineHeight = '1.8';

            footnoteDefinitions
                .sort((a, b) => parseInt(a.num) - parseInt(b.num))
                .forEach(fn => {
                    const li = document.createElement('li');
                    li.id = 'fn-' + fn.num;
                    li.style.marginBottom = '8px';
                    let content = fn.content;
                    const mdLink = content.match(/^\[([^\]]+)\]\(([^)]+)\)$/);
                    if (mdLink) {
                        content = `<a href="${mdLink[2]}" target="_blank" rel="noopener noreferrer">${mdLink[2]}</a>`;
                    } else if (content.match(/^https?:\/\//)) {
                        content = `<a href="${content}" target="_blank" rel="noopener noreferrer">${content}</a>`;
                    }
                    li.innerHTML = content;
                    list.appendChild(li);
                });

            footnotesHeader.parentNode.insertBefore(list, footnotesHeader.nextSibling);
        }

        // Auto-link glossary terms in body text to their definitions via hover tooltip
        function applyGlossaryTooltips() {
            const glossaryHeader = Array.from(document.querySelectorAll('h1, h2, h3')).find(
                h => h.textContent.trim().toLowerCase() === 'glossary'
            );
            if (!glossaryHeader) return;

            // Find the glossary table that follows the heading
            let table = glossaryHeader.nextElementSibling;
            while (table && table.tagName !== 'TABLE') {
                table = table.nextElementSibling;
                if (table && /^H[1-3]$/.test(table.tagName)) return;
            }
            if (!table) return;

            // Build term -> definition map
            const terms = [];
            const seen = new Set();
            table.querySelectorAll('tbody tr').forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length < 2) return;
                const rawTerm = cells[0].textContent.trim();
                const definition = cells[1].textContent.trim();
                if (!rawTerm || !definition) return;

                // Generate searchable variants: full term, parenthetical-stripped, acronym-only
                const variants = new Set();
                variants.add(rawTerm);
                const parenStripped = rawTerm.replace(/\s*\(.*?\)\s*/g, '').trim();
                if (parenStripped) variants.add(parenStripped);
                const acronymMatch = rawTerm.match(/\(([A-Z][A-Za-z0-9+/\-]+)\)/);
                if (acronymMatch) variants.add(acronymMatch[1]);
                // Slash-separated synonyms (e.g., "SHRINCS / SHRIMPS")
                rawTerm.split('/').forEach(s => {
                    const t = s.trim();
                    if (t) variants.add(t);
                });

                variants.forEach(v => {
                    const key = v.toLowerCase();
                    if (seen.has(key)) return;
                    seen.add(key);
                    terms.push({ variant: v, term: rawTerm, definition });
                });
            });

            // Sort by length descending so longer phrases match before substrings
            terms.sort((a, b) => b.variant.length - a.variant.length);

            const escapeRe = s => s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const escapeAttr = s => s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Walk content and process each candidate paragraph/list-item/table-cell
            const content = document.getElementById('content');
            const blocks = content.querySelectorAll('p, li, td, blockquote');

            blocks.forEach(block => {
                // Skip if inside the glossary table itself
                if (block.closest('table') === table) return;
                // Skip if inside any heading
                if (block.closest('h1, h2, h3, h4, h5, h6')) return;

                // Track which terms we've already linked in this block (link only first occurrence)
                const usedInBlock = new Set();

                const walker = document.createTreeWalker(block, NodeFilter.SHOW_TEXT, {
                    acceptNode: node => {
                        // Skip text inside links, code, glossary spans, footnotes, headings
                        if (node.parentElement.closest('a, code, pre, .glossary-term, .footnote-ref, h1, h2, h3, h4, h5, h6')) {
                            return NodeFilter.FILTER_REJECT;
                        }
                        return NodeFilter.FILTER_ACCEPT;
                    }
                });

                const textNodes = [];
                let n;
                while ((n = walker.nextNode())) textNodes.push(n);

                textNodes.forEach(textNode => {
                    let text = textNode.nodeValue;
                    let modified = false;
                    const replacements = [];

                    for (const t of terms) {
                        if (usedInBlock.has(t.term)) continue;
                        // Word-boundary match, case-insensitive for the term
                        const re = new RegExp('(^|[^A-Za-z0-9])(' + escapeRe(t.variant) + ')(?![A-Za-z0-9])', 'i');
                        const m = re.exec(text);
                        if (m) {
                            replacements.push({ index: m.index + m[1].length, length: m[2].length, t });
                            usedInBlock.add(t.term);
                            modified = true;
                        }
                    }

                    if (!modified) return;

                    // Apply replacements in reverse so indices stay valid
                    replacements.sort((a, b) => b.index - a.index);

                    // Build the resulting HTML
                    let resultHtml = '';
                    let cursor = text.length;
                    const parts = [];
                    replacements.forEach(r => {
                        parts.push({ kind: 'text', value: text.substring(r.index + r.length, cursor) });
                        const matched = text.substring(r.index, r.index + r.length);
                        const tooltipHtml = `<span class="glossary-tooltip"><span class="glossary-tooltip-title">${escapeAttr(r.t.term)}</span>${escapeAttr(r.t.definition)}</span>`;
                        parts.push({ kind: 'term', html: `<span class="glossary-term">${escapeHtml(matched)}${tooltipHtml}</span>` });
                        cursor = r.index;
                    });
                    parts.push({ kind: 'text', value: text.substring(0, cursor) });
                    parts.reverse();

                    const fragment = document.createDocumentFragment();
                    parts.forEach(p => {
                        if (p.kind === 'text') {
                            fragment.appendChild(document.createTextNode(p.value));
                        } else {
                            const wrap = document.createElement('span');
                            wrap.innerHTML = p.html;
                            while (wrap.firstChild) fragment.appendChild(wrap.firstChild);
                        }
                    });

                    textNode.parentNode.replaceChild(fragment, textNode);
                });
            });
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function fetchLastUpdated() {
            fetch('https://api.github.com/repos/presidiobtc/bitcoin-quantum/commits?per_page=1')
                .then(response => response.json())
                .then(data => {
                    if (data && data.length > 0) {
                        const lastCommitDate = new Date(data[0].commit.author.date);
                        const formattedDate = lastCommitDate.toLocaleDateString('en-US', {
                            year: 'numeric',
                            month: 'long',
                            day: 'numeric'
                        });
                        document.getElementById('last-updated').textContent = `Last updated: ${formattedDate}`;
                    }
                })
                .catch(() => {
                    document.getElementById('last-updated').textContent = 'Last updated: See GitHub';
                });
        }

        function fixHeaderIds() {
            document.querySelectorAll('h1, h2, h3, h4, h5, h6').forEach(header => {
                const text = header.textContent || header.innerText || '';
                const newId = text.toLowerCase()
                    .replace(/[^\w\s-]/g, '')
                    .replace(/\s+/g, '-')
                    .trim();
                if (newId) header.id = newId;
            });
        }

        function generateTOC() {
            const content = document.getElementById('content');
            const toc = document.getElementById('toc');

            const headers = Array.from(content.querySelectorAll('h1, h2, h3, h4')).filter(h => {
                const t = (h.textContent || '').trim();
                if (t === REPORT_TITLE) return false;
                if (t.toLowerCase() === 'table of contents') return false;
                if (!h.id) {
                    h.id = t.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-').trim();
                }
                return true;
            });

            const root = { children: [], level: 0 };
            const stack = [root];
            headers.forEach(header => {
                const level = parseInt(header.tagName.substring(1));
                const node = { header, level, children: [] };
                while (stack.length > 1 && stack[stack.length - 1].level >= level) stack.pop();
                stack[stack.length - 1].children.push(node);
                stack.push(node);
            });

            function renderNodes(nodes, parentUl) {
                nodes.forEach(node => {
                    const li = document.createElement('li');
                    li.className = 'toc-item toc-level-' + node.level;

                    const row = document.createElement('div');
                    row.className = 'toc-row';

                    if (node.children.length > 0) {
                        li.classList.add('has-children');
                        const toggle = document.createElement('button');
                        toggle.className = 'toc-toggle';
                        toggle.type = 'button';
                        toggle.setAttribute('aria-label', 'Toggle subsections');
                        toggle.innerHTML = '<svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 2 8 6 4 10"></polyline></svg>';
                        toggle.addEventListener('click', e => {
                            e.preventDefault();
                            e.stopPropagation();
                            li.classList.toggle('expanded');
                        });
                        row.appendChild(toggle);
                    } else {
                        const spacer = document.createElement('span');
                        spacer.className = 'toc-toggle-spacer';
                        row.appendChild(spacer);
                    }

                    const a = document.createElement('a');
                    a.href = '#' + node.header.id;
                    a.textContent = node.header.textContent;
                    a.dataset.targetId = node.header.id;

                    a.addEventListener('click', e => {
                        e.preventDefault();
                        node.header.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        document.querySelectorAll('.toc a').forEach(l => l.classList.remove('active'));
                        a.classList.add('active');
                        history.replaceState(null, '', '#' + node.header.id);
                        expandAncestors(li);
                    });
                    row.appendChild(a);

                    li.appendChild(row);

                    if (node.children.length > 0) {
                        const childUl = document.createElement('ul');
                        childUl.className = 'toc-children';
                        renderNodes(node.children, childUl);
                        li.appendChild(childUl);
                    }

                    parentUl.appendChild(li);
                });
            }

            renderNodes(root.children, toc);

            // If URL has a hash, expand path to it
            if (window.location.hash) {
                const link = toc.querySelector(`a[href="${window.location.hash}"]`);
                if (link) expandAncestors(link.closest('.toc-item'));
            }
        }

        function expandAncestors(li) {
            let p = li;
            while (p) {
                if (p.classList && p.classList.contains('toc-item')) p.classList.add('expanded');
                p = p.parentElement ? p.parentElement.closest('.toc-item') : null;
            }
        }

        function setupScrollSpy() {
            const headers = document.querySelectorAll('#content h1, #content h2, #content h3, #content h4');
            const tocLinks = document.querySelectorAll('.toc a');
            let scrollTimeout;
            let lastHash = window.location.hash;

            window.addEventListener('scroll', () => {
                let current = '';
                headers.forEach(header => {
                    const rect = header.getBoundingClientRect();
                    if (rect.top <= 100) current = header.id;
                });

                let activeLink = null;
                tocLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === '#' + current) {
                        link.classList.add('active');
                        activeLink = link;
                    }
                });

                if (activeLink) expandAncestors(activeLink.closest('.toc-item'));

                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => {
                    if (current && '#' + current !== lastHash) {
                        history.replaceState(null, '', current ? '#' + current : window.location.pathname);
                        lastHash = '#' + current;
                    }
                }, 150);
            });
        }

        function setupMobileInteractions() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            const sidebarOverlay = document.getElementById('sidebarOverlay');

            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                sidebarOverlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
                setTimeout(() => {
                    sidebarOverlay.classList.toggle('active', sidebar.classList.contains('active'));
                }, 10);
                document.body.style.overflow = sidebar.classList.contains('active') ? 'hidden' : '';
            });

            sidebarOverlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                sidebarOverlay.classList.remove('active');
                setTimeout(() => { sidebarOverlay.style.display = 'none'; }, 300);
                document.body.style.overflow = '';
            });

            if (window.innerWidth <= 1024) {
                document.querySelectorAll('.toc a').forEach(link => {
                    link.addEventListener('click', () => {
                        sidebar.classList.remove('active');
                        sidebarOverlay.classList.remove('active');
                        setTimeout(() => { sidebarOverlay.style.display = 'none'; }, 300);
                        document.body.style.overflow = '';
                    });
                });
            }

            if ('ontouchstart' in window) {
                document.addEventListener('click', (e) => {
                    const footnoteRef = e.target.closest('.footnote-ref');
                    const glossaryTerm = e.target.closest('.glossary-term');

                    if (footnoteRef || glossaryTerm) {
                        e.preventDefault();
                        const target = footnoteRef || glossaryTerm;
                        const selector = footnoteRef ? '.footnote-ref.active' : '.glossary-term.active';
                        document.querySelectorAll(selector).forEach(el => {
                            if (el !== target) el.classList.remove('active');
                        });
                        target.classList.toggle('active');
                    } else {
                        document.querySelectorAll('.footnote-ref.active, .glossary-term.active').forEach(el => {
                            el.classList.remove('active');
                        });
                    }
                });
            }
        }

        function wrapTables() {
            document.querySelectorAll('table').forEach(table => {
                const wrapper = document.createElement('div');
                wrapper.className = 'table-wrapper';
                table.parentNode.insertBefore(wrapper, table);
                wrapper.appendChild(table);
            });
        }
    </script>
</body>
